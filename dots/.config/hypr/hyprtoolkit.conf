# hyprtoolkit — shared theming for all hyprtoolkit apps (hyprlauncher, ...)
# Swap the line below to change theme. See ./palettes/ for options.
source = ~/.config/hypr/palettes/gruvbox-dark.conf

rounding_large = 10
rounding_small = 5

h1_size         = 19
h2_size         = 15
h3_size         = 13
font_size       = 12
small_font_size = 11

font_family           = BlexMono Nerd Font
font_family_monospace = BlexMono Nerd Font

icon_theme = 
